<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rhythm App Ultimate PWA</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rhythm">

<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
  margin:0;
  background:#0d0d0f;
  color:white;
  font-family:sans-serif;
  padding:20px;
}
.card{
  background:#1a1a1f;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}
button{
  border:none;
  border-radius:12px;
  padding:12px 18px;
  background:#c8ff5f;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
.step-grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:6px;
}
@media(min-width:700px){
  .step-grid{
    grid-template-columns:repeat(16,1fr);
  }
}
.step{
  min-height:52px;
  background:#222;
  border-radius:8px;
  border:1px solid #333;
}
.step.on{
  background:#c8ff5f55;
}
.step.accent{
  background:#5fc8ff66;
}
.step.active{
  outline:2px solid white;
}
</style>
</head>
<body>

<div class="card">
<h1>Rhythm App Ultimate PWA</h1>

<button id="playBtn">PLAY</button>

<p id="status">STOPPED</p>
</div>

<div class="card">
<div class="step-grid" id="grid"></div>
</div>

<script>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const master = audioCtx.createGain();
master.connect(audioCtx.destination);

const BPM = 120;
const STEPS = 16;

let currentStep = 0;
let nextTime = 0;
let playing = false;
let timer = null;

const pattern = Array.from({length:STEPS}, (_,i)=>({
  on:i % 4 === 0,
  accent:i === 0
}));

function buildGrid(){

  const grid = document.getElementById("grid");

  for(let i=0;i<STEPS;i++){

    const btn = document.createElement("div");

    btn.className = "step";

    if(pattern[i].accent){
      btn.classList.add("accent");
    }else if(pattern[i].on){
      btn.classList.add("on");
    }

    grid.appendChild(btn);
  }
}

function playSound(time, accent){

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(master);

  osc.frequency.value = accent ? 1200 : 700;

  gain.gain.setValueAtTime(
    accent ? 0.3 : 0.15,
    time
  );

  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    time + 0.05
  );

  osc.start(time);
  osc.stop(time + 0.06);
}

function scheduler(){

  while(nextTime < audioCtx.currentTime + 0.1){

    const step = pattern[currentStep];

    if(step.on){
      playSound(nextTime, step.accent);
    }

    const snapshot = currentStep;

    requestAnimationFrame(()=>{
      updateUI(snapshot);
    });

    currentStep++;

    if(currentStep >= STEPS){
      currentStep = 0;
    }

    nextTime += (60 / BPM) / 4;
  }
}

function updateUI(step){

  document.querySelectorAll(".step")
    .forEach(el=>el.classList.remove("active"));

  const el = document.querySelectorAll(".step")[step];

  if(el){
    el.classList.add("active");
  }
}

async function toggle(){

  if(audioCtx.state === "suspended"){
    await audioCtx.resume();
  }

  playing = !playing;

  if(playing){

    nextTime = audioCtx.currentTime + 0.1;

    timer = setInterval(scheduler, 25);

    document.getElementById("status").textContent = "PLAYING";

    document.getElementById("playBtn").textContent = "STOP";

  }else{

    clearInterval(timer);

    document.getElementById("status").textContent = "STOPPED";

    document.getElementById("playBtn").textContent = "PLAY";
  }
}

document.getElementById("playBtn")
  .onclick = toggle;

if("serviceWorker" in navigator){

  window.addEventListener("load", ()=>{

    navigator.serviceWorker
      .register("./sw.js")
      .then(()=>console.log("SW READY"));

  });
}

buildGrid();

</script>

</body>
</html>
