
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rhythm App Ultimate</title>

<style>
:root{
  --bg:#0d0d0f;
  --surface:#1a1a1f;
  --text:#f0f0f0;
  --muted:#8b8b93;
  --acc:#c8ff5f;
  --acc2:#5fc8ff;
  --danger:#ff5f9f;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:sans-serif;
  padding:16px;
}

.container{
  max-width:1000px;
  margin:auto;
}

.card{
  background:var(--surface);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

h1{
  margin-top:0;
}

.transport{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}

button{
  cursor:pointer;
  border:none;
  border-radius:10px;
  padding:10px 16px;
  background:var(--acc);
  color:black;
  font-weight:bold;
}

button.secondary{
  background:#2b2b31;
  color:white;
}

button.danger{
  background:var(--danger);
  color:white;
}

input[type=range]{
  width:100%;
}

.step-grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:6px;
}

@media(min-width:700px){
  .step-grid{
    grid-template-columns:repeat(16,1fr);
  }
}

.step{
  min-height:52px;
  border-radius:8px;
  border:1px solid #333;
  background:#222;
  color:#aaa;
  font-size:11px;
}

.step.on{
  background:rgba(200,255,95,.2);
  color:var(--acc);
}

.step.accent{
  background:rgba(95,200,255,.25);
  color:var(--acc2);
}

.step.active{
  outline:2px solid white;
  transform:scale(.95);
}

.row{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
}

.col{
  flex:1;
  min-width:260px;
}

select,input[type=number]{
  background:#222;
  color:white;
  border:1px solid #444;
  border-radius:8px;
  padding:8px;
}

.stats{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}

.stat{
  min-width:80px;
}

.stat .v{
  font-size:24px;
  color:var(--acc);
}

.small{
  font-size:12px;
  color:var(--muted);
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Rhythm App Ultimate</h1>

<div class="transport">

<button id="playBtn">PLAY</button>

<button class="secondary" id="tapBtn">TAP</button>

<button class="secondary" id="saveBtn">SAVE</button>

<button class="secondary" id="loadBtn">LOAD</button>

<input type="file" id="loadFile" hidden accept=".json">

</div>

<div class="stats">
<div class="stat">
<div class="small">BPM</div>
<div class="v" id="statBpm">120</div>
</div>

<div class="stat">
<div class="small">TEMPO</div>
<div class="v" id="statTempo">1</div>
</div>

<div class="stat">
<div class="small">BAR</div>
<div class="v" id="statBar">1</div>
</div>
</div>

</div>

<div class="card">

<div class="row">

<div class="col">
<label>テンポ数</label>
<select id="tempoCount">
<option value="1">1</option>
<option value="2" selected>2</option>
<option value="3">3</option>
</select>
</div>

<div class="col">
<label>ランダム切替</label>
<input type="checkbox" id="randomMode">
</div>

<div class="col">
<label>Humanize</label>
<input type="checkbox" id="humanize">
</div>

<div class="col">
<label>Swing</label>
<input type="range" id="swing" min="0" max="0.4" step="0.01" value="0">
</div>

</div>

</div>

<div id="tempoArea"></div>

</div>

<script>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const master = audioCtx.createGain();
master.gain.value = 0.8;
master.connect(audioCtx.destination);

const LOOKAHEAD = 25;
const SCHEDULE_AHEAD = 0.15;

let schedulerId = null;
let nextNoteTime = 0;

let isPlaying = false;

let currentStep = 0;
let currentBar = 0;
let currentTempoIndex = 0;

let sequence = [];

let lastTap = 0;
let tapHistory = [];

const TEMPO_PRESETS = [
  makeTempo(120,4,2),
  makeTempo(90,3,2),
  makeTempo(70,4,2)
];

function getSteps(ts){
  return ts * 4;
}

function makeTempo(bpm, ts, bars){

  const steps = getSteps(ts);

  return {
    bpm,
    timeSig:ts,
    bars,
    pattern:Array.from({length:steps}, (_,i)=>({
      on:i % 4 === 0,
      accent:i === 0
    }))
  };
}

function buildUI(){

  const area = document.getElementById("tempoArea");
  area.innerHTML = "";

  const count = Number(document.getElementById("tempoCount").value);

  for(let i=0;i<count;i++){

    const d = TEMPO_PRESETS[i];

    const wrap = document.createElement("div");
    wrap.className = "card";

    const steps = getSteps(d.timeSig);

    wrap.innerHTML = `
      <div class="row">

        <div class="col">
          <label>TEMPO ${i+1} BPM</label>
          <input type="number" min="20" max="300" value="${d.bpm}" id="bpm-${i}">
        </div>

        <div class="col">
          <label>拍子</label>
          <select id="ts-${i}">
            <option value="2" ${d.timeSig===2?'selected':''}>2/4</option>
            <option value="3" ${d.timeSig===3?'selected':''}>3/4</option>
            <option value="4" ${d.timeSig===4?'selected':''}>4/4</option>
            <option value="5" ${d.timeSig===5?'selected':''}>5/4</option>
            <option value="6" ${d.timeSig===6?'selected':''}>6/4</option>
          </select>
        </div>

        <div class="col">
          <label>小節数</label>
          <input type="number" min="1" max="16" value="${d.bars}" id="bars-${i}">
        </div>

      </div>

      <br>

      <div class="step-grid" id="grid-${i}"></div>
    `;

    area.appendChild(wrap);

    const grid = wrap.querySelector(`#grid-${i}`);

    for(let s=0;s<steps;s++){

      const btn = document.createElement("button");

      btn.className = "step";

      refreshStepClass(btn, d.pattern[s]);

      btn.innerHTML = `
        <div>${s+1}</div>
      `;

      btn.onclick = () => {

        const st = d.pattern[s];

        if(!st.on){
          st.on = true;
          st.accent = false;
        }else if(!st.accent){
          st.accent = true;
        }else{
          st.on = false;
          st.accent = false;
        }

        refreshStepClass(btn, st);
      };

      grid.appendChild(btn);
    }

    wrap.querySelector(`#ts-${i}`).onchange = e => {

      const ts = Number(e.target.value);

      const oldPattern = d.pattern;

      d.timeSig = ts;

      const newSteps = getSteps(ts);

      d.pattern = Array.from({length:newSteps}, (_,idx)=>{

        return oldPattern[idx] || {
          on:false,
          accent:false
        };
      });

      buildUI();
    };
  }
}

function refreshStepClass(el, st){

  el.className = "step";

  if(st.accent){
    el.classList.add("accent");
  }else if(st.on){
    el.classList.add("on");
  }
}

function buildSequence(){

  const count = Number(document.getElementById("tempoCount").value);

  sequence = Array.from({length:count}, (_,i)=>i);

  if(document.getElementById("randomMode").checked){

    for(let i=sequence.length-1;i>0;i--){
      const j = Math.floor(Math.random() * (i+1));
      [sequence[i],sequence[j]] = [sequence[j],sequence[i]];
    }
  }
}

function currentTempo(){
  return TEMPO_PRESETS[sequence[currentTempoIndex]];
}

function playClick(time, accent){

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(master);

  osc.type = accent ? "square" : "sine";

  osc.frequency.value = accent ? 1200 : 700;

  gain.gain.setValueAtTime(accent ? 0.35 : 0.2, time);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);

  osc.start(time);
  osc.stop(time + 0.06);
}

function scheduler(){

  while(nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD){

    const d = currentTempo();

    d.bpm = Number(document.getElementById(`bpm-${sequence[currentTempoIndex]}`).value);
    d.timeSig = Number(document.getElementById(`ts-${sequence[currentTempoIndex]}`).value);
    d.bars = Number(document.getElementById(`bars-${sequence[currentTempoIndex]}`).value);

    const steps = getSteps(d.timeSig);

    if(currentStep >= steps){
      currentStep = 0;
    }

    const step = d.pattern[currentStep];

    let timing = nextNoteTime;

    const swing = Number(document.getElementById("swing").value);

    if(currentStep % 2 === 1){
      timing += swing * ((60 / d.bpm) / 2);
    }

    if(document.getElementById("humanize").checked){
      timing += (Math.random() - 0.5) * 0.01;
    }

    if(step && step.on){
      playClick(timing, step.accent);
    }

    const snapshotStep = currentStep;
    const snapshotTempo = currentTempoIndex;

    requestAnimationFrame(() => {
      updateVisual(snapshotStep, snapshotTempo);
    });

    currentStep++;

    if(currentStep >= steps){

      currentStep = 0;

      currentBar++;

      if(currentBar >= d.bars){

        currentBar = 0;

        currentTempoIndex++;

        if(currentTempoIndex >= sequence.length){

          buildSequence();

          currentTempoIndex = 0;
        }
      }
    }

    const nextTempoData = currentTempo();

    const secPerStep =
      (60 / nextTempoData.bpm)
      / 4;

    nextNoteTime += secPerStep;
  }
}

function updateVisual(step, tempoIndex){

  document.querySelectorAll(".step")
    .forEach(el => el.classList.remove("active"));

  const grid = document.querySelector(`#grid-${sequence[tempoIndex]}`);

  if(grid){

    const btn = grid.children[step];

    if(btn){
      btn.classList.add("active");
    }
  }

  const d = currentTempo();

  document.getElementById("statBpm").textContent = d.bpm;
  document.getElementById("statTempo").textContent = currentTempoIndex + 1;
  document.getElementById("statBar").textContent = currentBar + 1;
}

async function togglePlay(){

  if(audioCtx.state === "suspended"){
    await audioCtx.resume();
  }

  isPlaying = !isPlaying;

  if(isPlaying){

    buildSequence();

    currentStep = 0;
    currentBar = 0;
    currentTempoIndex = 0;

    nextNoteTime = audioCtx.currentTime + 0.1;

    schedulerId = setInterval(
      scheduler,
      LOOKAHEAD
    );

    document.getElementById("playBtn").textContent = "STOP";

  }else{

    clearInterval(schedulerId);

    document.getElementById("playBtn").textContent = "PLAY";

    document.querySelectorAll(".step")
      .forEach(el => el.classList.remove("active"));
  }
}

document.getElementById("playBtn")
  .onclick = togglePlay;

document.getElementById("tempoCount")
  .onchange = buildUI;

document.getElementById("tapBtn")
  .onclick = () => {

    const now = performance.now();

    if(lastTap){

      const diff = now - lastTap;

      const bpm = Math.round(60000 / diff);

      tapHistory.push(bpm);

      if(tapHistory.length > 4){
        tapHistory.shift();
      }

      const avg = Math.round(
        tapHistory.reduce((a,b)=>a+b,0)
        / tapHistory.length
      );

      document.getElementById("bpm-0").value = avg;
    }

    lastTap = now;
  };

document.getElementById("saveBtn")
  .onclick = () => {

    const data = JSON.stringify(TEMPO_PRESETS);

    localStorage.setItem("rhythm-save", data);

    const blob = new Blob([data], {type:"application/json"});

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = "rhythm-preset.json";

    a.click();
  };

document.getElementById("loadBtn")
  .onclick = () => {
    document.getElementById("loadFile").click();
  };

document.getElementById("loadFile")
  .onchange = async e => {

    const file = e.target.files[0];

    if(!file) return;

    const text = await file.text();

    const parsed = JSON.parse(text);

    for(let i=0;i<parsed.length;i++){
      TEMPO_PRESETS[i] = parsed[i];
    }

    buildUI();
  };

document.addEventListener(
  "visibilitychange",
  async () => {

    if(document.visibilityState === "visible"){

      if(audioCtx.state === "suspended"){
        await audioCtx.resume();
      }
    }
  }
);

buildUI();

</script>

</body>
</html>
